<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="A fun multiplayer memory matching game. Test your memory and compete with friends!" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="logo-192.png" />
    <title>Pairingo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-content">
          <img src="logo.png" alt="" class="header-logo" />
          <div class="header-text">
            <h1>Pairingo</h1>
            <p>Flip two cards. Match a pair to score and keep your turn.</p>
          </div>
        </div>
        <button id="toggle-ui" class="toggle-ui-btn" title="Toggle controls visibility" aria-label="Toggle controls visibility">
          <span class="toggle-icon">▼</span>
        </button>
      </header>

      <section class="controls" aria-label="Game controls">
        <!-- Hidden cheat mode checkbox (controlled by ?cheat=on query param) -->
        <input type="checkbox" id="cheat-mode" name="cheat-mode" style="display: none;" />

        <!-- Restart / player count: swapped on game start -->
        <div class="game-start-row">
          <button id="restart-btn" class="start-button" type="button" style="display:none;">Restart Game</button>
          <div id="player-count-selector" class="player-count-selector">
          <label class="player-pill">
            <input type="radio" name="player-count" value="1" />
            <span>1</span>
          </label>
          <label class="player-pill">
            <input type="radio" name="player-count" value="2" checked />
            <span>2</span>
          </label>
          <label class="player-pill">
            <input type="radio" name="player-count" value="3" />
            <span>3</span>
          </label>
          <label class="player-pill">
            <input type="radio" name="player-count" value="4" />
            <span>4</span>
          </label>
        </div>
        </div><!-- end .game-start-row -->

        <!-- Edition selector -->
        <div class="edition-selector">
          <button class="edition-pill active" data-edition="default">Classic</button>
          <button class="edition-pill" data-edition="flags">Flags 🌍</button>
          <button class="edition-pill" data-edition="bugs">Bugs 🐛</button>
        </div>

        <!-- Speech toggle (shown for non-classic editions) -->
        <label id="speech-toggle-label" class="speech-toggle hidden">
          <input type="checkbox" id="speech-toggle" checked>
          Speak
        </label>

        <!-- Invite Players button -->
        <button id="invite-btn" class="secondary-button" type="button">Invite Players</button>

        <!-- Join room section (shown when not connected) -->
        <div id="join-section" class="join-section">
          <input
            id="room-input"
            type="text"
            inputmode="text"
            autocomplete="off"
            placeholder="Enter room code"
            aria-label="Room code"
          />
          <button id="join-btn" class="secondary-button" type="button">Join Room</button>
        </div>

        <!-- Disconnect button (shown when connected to a room) -->
        <button id="disconnect-btn" class="secondary-button hidden" type="button">Disconnect</button>

        <!-- Status bar -->
        <div class="status-bar">
          <p class="connection-info hidden" id="connection-info">
            Room: <span id="room-code">-</span> · <span id="connection-status">Offline</span>
          </p>
        </div>
      </section>

      <section class="scoreboard-section" aria-label="Scoreboard">
        <span id="game-timer" class="game-timer hidden">0:00</span>
        <ul id="scoreboard" class="scoreboard"></ul>
      </section>

      <div class="game-header">
        <div id="turn-timer" class="turn-timer hidden">
          <div class="timer-bar"><div id="timer-fill" class="timer-fill"></div></div>
        </div>
      </div>

      <section id="game-board" class="board" role="grid" aria-label="Memory game board"></section>
    </div>

    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
      }
    </script>
  </body>
</html>
